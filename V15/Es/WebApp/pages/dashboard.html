<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel – Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <!-- GLOBAL -->
  <link rel="stylesheet" href="../assets/css/global.css">

  <!-- (opcional después mover aquí estilos dashboard) -->
  <link rel="stylesheet" href="../assets/css/dashboard.css">

  <script src="../assets/js/global.js" defer></script>
  <script src="../assets/js/dashboard.js" defer></script>
</head>

<body>

<div class="layout">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="logo">
      <img src="/Logo.png" alt="Agranel">
      <h2>Panel</h2>
    </div>

    <nav class="menu">
      <a href="dashboard.html" class="item active">📊 Dashboard</a>
      <a href="ventas.html" class="item">💰 Ventas</a>
      <a href="inventario.html" class="item">📦 Inventario</a>
      <a href="configuracion.html" class="item">⚙️ Configuración</a>
      <a href="monitoreo.html" class="item">📡 Monitoreo</a>
      <a id="logout" class="item">🚪 Cerrar sesión</a>
    </nav>

    <!-- SWITCH GLOBAL -->
    <div class="theme-toggle">
      <span>🌙 Modo claro</span>
      <label class="switch">
        <input type="checkbox" id="themeSwitch">
        <span class="slider"></span>
      </label>
    </div>
  </aside>

  <div id="overlay" class="overlay"></div>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <button id="menuBtn" class="menu-btn">☰</button>
      <h1>📊 Dashboard</h1>
      <span id="status" class="status-dot offline"></span>
    </header>

    <!-- HEADER -->
    <div class="inv-header">
      <h2 class="section-title">Resumen de ventas</h2>
    </div>

    <!-- ===== CONTENT ===== -->
    <section class="content">

      <!-- GRID DASHBOARD -->
      <div class="dashboard-grid">

      <!-- Balance -->
      <div class="inv-card">
        <div class="card-header">
          <h3>💰 Balance</h3>
        </div>
        <div class="card-precio" id="balance">$0</div>
        <div class="card-footer">
          <div class="card-info">
            <span>Total generado</span>
          </div>
        </div>
      </div>

      <!-- Ventas -->
      <div class="inv-card">
        <div class="card-header">
          <h3>🧾 Ventas totales</h3>
        </div>
        <div class="card-precio" id="totalVentas">0</div>
        <div class="card-footer">
          <div class="card-info">
            <span>Transacciones</span>
          </div>
        </div>
      </div>

      <!-- GRÁFICA -->
      <div class="card chart-card chart-big" id="chartVentas">
        <h2>🧩 Distribución de ventas</h2>
        <div class="chart-container">
          <canvas id="ventasChart"></canvas>
        </div>
      </div>

      <!-- Ventas hoy -->
      <div class="inv-card">
        <div class="card-header">
          <h3>📅 Ventas hoy</h3>
        </div>
        <div class="card-precio" id="ventasHoy">0</div>
        <div class="card-footer">
          <div class="card-info">
            <span>Hoy</span>
          </div>
        </div>
      </div>

      <!-- Producto top -->
      <div class="inv-card">
        <div class="card-header">
          <h3>🏆 Producto top</h3>
        </div>
        <div class="card-precio" id="topProducto">-</div>
        <div class="card-footer">
          <div class="card-info">
            <span>Más vendido</span>
          </div>
        </div>
      </div>

    </div>

    </section>

    <!-- ===== SECCIÓN 7 DÍAS ===== -->
    <section class="chart-section">

      <div class="chart-card">
        <h2 class="section-title">📈 Ventas últimos 7 días</h2>

        <div class="chart-container chart-line">
          <canvas id="chart7dias"></canvas>
        </div>
      </div>

    </section>
    

  </main>
</div>

<!-- LOADER -->
<div id="globalLoader" class="loader-overlay hidden">
  <div class="loader"></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

</body>
</html>
