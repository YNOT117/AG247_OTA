<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel – Monitoreo</title>

  <link rel="stylesheet" href="../assets/css/global.css">
  <link rel="stylesheet" href="../assets/css/monitoreo.css">

  <script src="../assets/js/global.js" defer></script>
  <script src="../assets/js/monitoreo.js" defer></script>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <img src="/Logo.png">
      <h2>Panel</h2>
    </div>

    <nav class="menu">
      <a href="dashboard.html" class="item">📊 Dashboard</a>
      <a href="ventas.html" class="item">💰 Ventas</a>
      <a href="inventario.html" class="item">📦 Inventario</a>
      <a href="configuracion.html" class="item">⚙️ Configuración</a>
      <a href="monitoreo.html" class="item active">📡 Monitoreo</a>
      <a id="logout" class="item">🚪 Cerrar sesión</a>

      <div class="theme-toggle">
        <span>🌙 Modo claro</span>
        <label class="switch">
          <input type="checkbox" id="themeSwitch">
          <span class="slider"></span>
        </label>
      </div>
    </nav>
  </aside>

  <div id="overlay" class="overlay"></div>

  <!-- MAIN -->
  <main class="main">

    <header class="topbar">
      <button id="menuBtn" class="menu-btn">☰</button>
      <h1>Monitoreo</h1>
      <span id="status" class="status-dot offline"></span>
    </header>

    <section class="content cards-mobile">

      <!-- PCBA -->
      <div class="inv-card">
        <div class="card-header">
          <h3>🖥️ Información</h3>
        </div>

        <div class="form-group">
          <label>Nombre</label>
          <input id="pcbaName" class="input">
        </div>

        <div class="form-group">
          <label>Usuario</label>
          <input id="pcbaUser" class="input">
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input id="pcbaPass" type="password" class="input">
        </div>

        <div class="card-actions">
          <button id="savePcbaBtn" class="btn btn-primary">💾 Guardar</button>
        </div>
      </div>

      <!-- WIFI -->
      <div class="inv-card">
        <div class="card-header">
          <h3>📶 WiFi</h3>
        </div>

        <div class="info-block">
          <p><span>SSID</span><b id="monitorSSID">--</b></p>
          <p><span>Señal</span><b id="monitorRSSI">--</b></p>
          <p><span>Contraseña</span><b id="monitorPASS">--</b></p>
          <p><span>IP</span><b id="monitorIP">--</b></p>
        </div>
      </div>

      <!-- TELEGRAM -->
      <div class="inv-card">
        <div class="card-header">
          <h3>🤖 Telegram</h3>
        </div>

        <div class="form-group">
          <label>Token</label>
          <input id="telegramToken" class="input">
        </div>

        <div class="form-group">
          <label>Chat ID</label>
          <input id="telegramChatID" class="input">
        </div>

        <label class="toggle-row">
          <input type="checkbox" id="useGroupID" class="toggle-input">
          <span class="toggle"></span>
          <span class="toggle-text">Usar Group ID</span>
        </label>

        <div class="form-group">
          <label>Group ID</label>
          <input id="telegramGroupID" class="input" disabled>
        </div>

        <div class="card-actions">
          <button id="saveTelegramBtn" class="btn btn-primary btn-block">💾 Guardar</button>
          <button id="testTelegramBtn" class="btn btn-secondary btn-block">📤 Prueba</button>
        </div>
      </div>

    </section>

  </main>
</div>

<!-- LOADER -->
<div id="globalLoader" class="loader-overlay hidden">
  <div class="loader"></div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<!-- MODAL RESTART -->
<div id="restartModal" class="modal hidden">
  <div class="modal-content">
    <h2>Reinicio requerido</h2>
    <p>Se necesita reiniciar la tarjeta</p>
    <button id="modalClose" class="btn btn-primary">Aceptar</button>
  </div>
</div>

</body>
</html>
